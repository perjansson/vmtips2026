<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>VM-tipset 2026</title>
  <meta name="description" content="Aktuell ställning i VM 2026-tipset, uppdateras live.">
  <!-- Status-/verktygsfält matchas mot headerns övre kant (grass-deep). -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#176f3c">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1f9d55">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest?v=__BUILD_VERSION__">
  <style>
    /* Kritisk fallback så sidan ser ok ut även innan/utan style.css. */
    html { background: #1d8a4e; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #f3fbf5;
    }
  </style>
  <link rel="stylesheet" href="style.css?v=__BUILD_VERSION__">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='none' stroke='%231f9d55' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%231f9d55'/%3E%3C/svg%3E">
</head>
<body>
  <header class="hero">
    <div class="pitch-lines" aria-hidden="true"></div>
    <div class="balls" aria-hidden="true">
      <span style="--size:1.7rem; --x:6%;  --dur:2.7s; --delay:0s">&#9917;</span>
      <span style="--size:1rem;   --x:14%; --dur:2.1s; --delay:.5s">&#9917;</span>
      <span style="--size:1.35rem;--x:84%; --dur:3s;   --delay:.2s">&#9917;</span>
      <span style="--size:.8rem;  --x:93%; --dur:2.3s; --delay:.8s">&#9917;</span>
    </div>
    <h1 class="hero-title">VM&#8209;tipset 2026</h1>
    <p class="hero-updated" id="updated-at">Hämtar…</p>
    <p class="hero-points" id="points-progress">–</p>
    <section class="sched collapsed" id="sched" aria-label="Matchschema">
      <button class="sched-show" id="sched-show" type="button"
              aria-expanded="false" aria-controls="sched-days">Visa matcher</button>
      <div class="sched-actions sched-actions-top" id="sched-actions-top" hidden>
        <button class="sched-link" id="sched-earlier" type="button" hidden>Visa tidigare dagar</button>
      </div>
      <div class="sched-days" id="sched-days"></div>
      <div class="sched-actions">
        <button class="sched-link" id="sched-less" type="button" hidden>Visa färre</button>
        <button class="sched-link" id="sched-more" type="button" hidden>Visa fler dagar</button>
      </div>
    </section>
    <section class="ko-panel collapsed" id="ko-panel" aria-label="Lag vidare till slutspel" hidden>
      <button class="ko-panel-toggle" id="ko-panel-toggle" type="button"
              aria-expanded="false" aria-controls="ko-panel-rounds">Visa slutspelslag</button>
      <div class="ko-panel-rounds" id="ko-panel-rounds"></div>
    </section>
  </header>

  <main>
    <p id="notice" class="notice" hidden></p>
    <ol id="board" class="board" aria-label="Topplista"></ol>
    <section id="winner-consensus" class="winner-consensus" aria-label="VM-vinnare" hidden>
      <h2>🏆 VM-vinnare</h2>
      <div class="winner-chart"></div>
    </section>
  </main>

  <footer class="foot">
    <p>Poäng räknas om live från kalkylarket.</p>
    <p>Gruppmatch: 3 p rätt utgång + 1 p per prickat målantal.</p>
    <p>Lag vidare per rond: 5 p/lag.</p>
    <p>VM&#8209;vinnare: 10 p.</p>
  </footer>

  <template id="row-template">
    <li class="row">
      <button class="row-button" type="button" aria-expanded="false">
        <span class="rank-badge"></span>
        <span class="who">
          <span class="name-row">
            <span class="name"></span>
            <span class="rank-move" aria-hidden="true"></span>
          </span>
          <span class="chips">
            <span class="chip chip-group">Grupp <b></b></span>
            <span class="chip chip-knockout">Slutspel <b></b></span>
            <span class="chip chip-top3" hidden></span>
          </span>
        </span>
        <span class="live-col" hidden>
          <span class="live-col-label">Live</span>
          <span class="live-col-value"></span>
        </span>
        <span class="total">
          <span class="total-value">0</span>
          <span class="total-unit">p</span>
        </span>
      </button>
      <div class="detail" hidden>
        <dl class="detail-grid"></dl>
        <section class="twin-section" hidden>
          <h3>Tippa-tvillingar</h3>
          <p class="twin-caption">Antal matcher med exakt samma tippade slutresultat</p>
          <ul class="twin-list"></ul>
        </section>
        <section class="match-section match-recent" hidden>
          <h3>Senaste matcher</h3>
          <ul class="match-list"></ul>
        </section>
        <section class="match-section match-upcoming" hidden>
          <h3>Kommande matcher</h3>
          <ul class="match-list"></ul>
        </section>
      </div>
    </li>
  </template>

  <script src="schedule.js?v=__BUILD_VERSION__"></script>
  <script>window.__INITIAL_STANDINGS__ = /*__INITIAL__*/null;</script>
  <script src="app.js?v=__BUILD_VERSION__"></script>
</body>
</html>
