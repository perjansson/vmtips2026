<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>VM-tipset 2026 – Live-ställning</title>
  <meta name="description" content="Aktuell ställning i VM 2026-tipset, uppdateras live.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2aa45f">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14502e">
  <style>
    /* Kritisk fallback så sidan ser ok ut även innan/utan style.css. */
    html { background: #167a42; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #f3fbf5;
    }
  </style>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='none' stroke='%231f9d55' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%231f9d55'/%3E%3C/svg%3E">
</head>
<body>
  <header class="hero">
    <div class="pitch-lines" aria-hidden="true"></div>
    <div class="balls" aria-hidden="true">
      <span style="--size:1.7rem; --x:6%;  --dur:2.7s; --delay:0s">&#9917;</span>
      <span style="--size:1rem;   --x:14%; --dur:2.1s; --delay:.5s">&#9917;</span>
      <span style="--size:1.35rem;--x:84%; --dur:3s;   --delay:.2s">&#9917;</span>
      <span style="--size:.8rem;  --x:93%; --dur:2.3s; --delay:.8s">&#9917;</span>
    </div>
    <h1 class="hero-title">VM&#8209;tipset 2026</h1>
    <p class="hero-kicker">Live&#8209;ställning</p>
    <p class="hero-meta">
      <span id="match-progress">–</span>
      <span class="dot" aria-hidden="true">·</span>
      <span id="updated-at">Hämtar…</span>
    </p>
    <section class="played" id="played" hidden aria-label="Spelade matcher">
      <ol class="played-list" id="played-list"></ol>
      <button class="played-toggle" id="played-toggle" type="button"
              aria-expanded="false" aria-controls="played-list" hidden></button>
    </section>
  </header>

  <main>
    <p id="notice" class="notice" hidden></p>
    <ol id="board" class="board" aria-label="Topplista"></ol>
  </main>

  <footer class="foot">
    <p>Poäng räknas om live från kalkylarket. Gruppmatch: 3 p rätt utgång + 1 p per prickat målantal.
       Lag vidare per rond: 5 p/lag. VM&#8209;vinnare: 10 p.</p>
  </footer>

  <template id="row-template">
    <li class="row">
      <button class="row-button" type="button" aria-expanded="false">
        <span class="rank-badge"></span>
        <span class="who">
          <span class="name"></span>
          <span class="chips">
            <span class="chip chip-group">Grupp <b></b></span>
            <span class="chip chip-knockout">Slutspel <b></b></span>
          </span>
        </span>
        <span class="total">
          <span class="total-value">0</span>
          <span class="total-unit">p</span>
        </span>
      </button>
      <div class="detail" hidden>
        <dl class="detail-grid"></dl>
        <section class="match-section match-recent" hidden>
          <h3>Senaste matcher</h3>
          <ul class="match-list"></ul>
        </section>
        <section class="match-section match-upcoming" hidden>
          <h3>Kommande matcher</h3>
          <ul class="match-list"></ul>
        </section>
      </div>
    </li>
  </template>

  <script>window.__INITIAL_STANDINGS__ = /*__INITIAL__*/null;</script>
  <script src="app.js"></script>
</body>
</html>
