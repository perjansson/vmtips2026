services:
  - type: web
    name: vmtips2026
    runtime: node
    # Instanstyp: "starter" är alltid igång (inga kallstarter). "free" finns
    # också men spinner ner vid inaktivitet, vilket ger långsam första visning.
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    # Render släpper inte in trafik förrän nya instansen svarar här –
    # ger sömlösa deployer utan "Not Found"-fönster.
    healthCheckPath: /api/standings
    envVars:
      - key: SHEET_ID
        value: 1NlUCIKlLgaWAmGq4UKAcCAvzuwwKdMGLkDiWh7ZFoeY
      - key: SHEET_REFRESH_SECONDS
        value: "15"
      - key: CLIENT_POLL_SECONDS
        value: "5"
      - key: PREDICTIONS_REFRESH_SECONDS
        value: "300"
